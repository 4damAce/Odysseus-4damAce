version: '3.8'

services:
  ody:
    image: nginx:alpine
    container_name: odysseus-ody-1
    restart: unless-stopped
    ports:
      - 7861:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - ODYSSEUS_PC_HOST=${ODYSSEUS_PC_HOST:-host.docker.internal}
      - ODYSSEUS_PC_PORT=${ODYSSEUS_PC_PORT:-7860}
    networks:
      - umbrel
